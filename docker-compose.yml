services:
  gemini-h5:
    build: .
    image: gemini-h5:latest
    container_name: gemini-h5
    restart: unless-stopped
    ports:
      - "10000:10000"
    volumes:
      - ./data:/opt/gemini-h5/backend/data
      - ./config:/opt/gemini-h5/backend/config
      - ./examples:/opt/gemini-h5/backend/examples
    env_file:
      - .env
    environment:
      FRP_SERVER_ADDR: ${FRP_SERVER_ADDR:-frp4.ccszxc.xin}
      FRP_SERVER_PORT: ${FRP_SERVER_PORT:-55722}
      FRP_TOKEN: ${FRP_TOKEN}
      FRP_REMOTE_PORT: ${FRP_REMOTE_PORT:-55730}
